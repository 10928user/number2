<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>벽돌깨기</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #111;
    color: #fff;
    font-family: sans-serif;
  }
  h1 { margin: 16px 0 8px; }
  #info { margin-bottom: 8px; font-size: 18px; }
  canvas {
    background: #222;
    display: block;
    border: 2px solid #555;
  }
  #message {
    margin-top: 10px;
    font-size: 20px;
    min-height: 28px;
  }
  button {
    margin-top: 10px;
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>벽돌깨기</h1>
  <div id="info">점수: <span id="score">0</span> | 목숨: <span id="lives">3</span></div>
  <canvas id="game" width="480" height="360"></canvas>
  <div id="message"></div>
  <button id="restartBtn" style="display:none;">다시 시작</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

let ballRadius = 8;
let x, y, dx, dy;

const paddleHeight = 12;
const paddleWidth = 80;
let paddleX;

let rightPressed = false;
let leftPressed = false;

const brickRowCount = 4;
const brickColumnCount = 6;
const brickWidth = 62;
const brickHeight = 20;
const brickPadding = 10;
const brickOffsetTop = 40;
const brickOffsetLeft = 20;

let bricks = [];
let score = 0;
let lives = 3;
let gameRunning = true;

function initGame() {
  x = canvas.width / 2;
  y = canvas.height - 30;
  dx = 3;
  dy = -3;
  paddleX = (canvas.width - paddleWidth) / 2;
  score = 0;
  lives = 3;
  gameRunning = true;
  messageEl.textContent = '';
  restartBtn.style.display = 'none';

  bricks = [];
  for (let c = 0; c < brickColumnCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r] = { x: 0, y: 0, status: 1 };
    }
  }
  updateInfo();
}

function updateInfo() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
}

document.addEventListener('keydown', keyDownHandler);
document.addEventListener('keyup', keyUpHandler);

function keyDownHandler(e) {
  if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = true;
  else if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = true;
}
function keyUpHandler(e) {
  if (e.key === 'Right' || e.key === 'ArrowRight') rightPressed = false;
  else if (e.key === 'Left' || e.key === 'ArrowLeft') leftPressed = false;
}

canvas.addEventListener('mousemove', (e) => {
  const relativeX = e.clientX - canvas.getBoundingClientRect().left;
  if (relativeX > 0 && relativeX < canvas.width) {
    paddleX = relativeX - paddleWidth / 2;
  }
});

function collisionDetection() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      const b = bricks[c][r];
      if (b.status === 1) {
        if (
          x > b.x &&
          x < b.x + brickWidth &&
          y > b.y &&
          y < b.y + brickHeight
        ) {
          dy = -dy;
          b.status = 0;
          score++;
          updateInfo();
          if (score === brickRowCount * brickColumnCount) {
            endGame(true);
          }
        }
      }
    }
  }
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
  ctx.fillStyle = '#0ff';
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.beginPath();
  ctx.rect(paddleX, canvas.height - paddleHeight - 4, paddleWidth, paddleHeight);
  ctx.fillStyle = '#f0f';
  ctx.fill();
  ctx.closePath();
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      if (bricks[c][r].status === 1) {
        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;
        ctx.beginPath();
        ctx.rect(brickX, brickY, brickWidth, brickHeight);
        ctx.fillStyle = `hsl(${r * 60}, 70%, 55%)`;
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function endGame(won) {
  gameRunning = false;
  messageEl.textContent = won ? '축하합니다! 클리어했습니다 🎉' : '게임 오버 😢';
  restartBtn.style.display = 'inline-block';
}

function draw() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBricks();
  drawBall();
  drawPaddle();
  collisionDetection();

  if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
    dx = -dx;
  }
  if (y + dy < ballRadius) {
    dy = -dy;
  } else if (y + dy > canvas.height - ballRadius - paddleHeight - 4) {
    if (x > paddleX && x < paddleX + paddleWidth) {
      dy = -dy;
    } else if (y + dy > canvas.height - ballRadius) {
      lives--;
      updateInfo();
      if (!lives) {
        endGame(false);
        return;
      } else {
        x = canvas.width / 2;
        y = canvas.height - 30;
        dx = 3;
        dy = -3;
        paddleX = (canvas.width - paddleWidth) / 2;
      }
    }
  }

  if (rightPressed && paddleX < canvas.width - paddleWidth) {
    paddleX += 5;
  } else if (leftPressed && paddleX > 0) {
    paddleX -= 5;
  }

  x += dx;
  y += dy;

  requestAnimationFrame(draw);
}

restartBtn.addEventListener('click', () => {
  initGame();
  requestAnimationFrame(draw);
});

initGame();
draw();
</script>
</body>
